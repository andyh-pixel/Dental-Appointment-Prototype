<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css">
  
</head>
<body>
 
  <nav class="navbar navbar-expand-lg px-4">
    <a class="navbar-brand fw-semibold text-dark" href="index.html">Dental Clinic Appointment</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="index.html">Book Appointment</a></li>
      <li class="nav-item"><a class="nav-link" href="Schedule.html">Schedule</a></li>
      <li class="nav-item"><a class="nav-link" href="Login.html">Login</a></li>
      <li class="nav-item"><a class="nav-link" href="Register.html">Register</a></li>
    </ul>
  </nav>
 
  <div class="container h-100">
    		<div class="row h-100">
				<div class="col-sm-10 col-md-8 col-lg-6 mx-auto d-table h-100">
					<div class="d-table-cell align-middle">

            <!-- REGISTER CARD -->
						<div class="text-center mt-4">
							<h1 class="h2">Register</h1>
						</div>

						<div class="card">
							<div class="card-body">
								<div class="m-sm-4">
									<form>
										<div class="form-group">
											<label>Name</label>
											<input class="form-control form-control-lg" type="text" name="name" placeholder="Enter your name">
										</div>
										<div class="form-group">
											<label>Phone Number</label>
											<input class="form-control form-control-lg" type="text" name="phone" placeholder="Enter your phone number">
										</div>
										<div class="form-group">
											<label>Email</label>
											<input class="form-control form-control-lg" type="email" name="email" placeholder="Enter your email">
										</div>
										<div class="form-group">
											<label>Password</label>
											<input class="form-control form-control-lg" type="password" name="password" placeholder="Enter password">
										</div>
                    <div class="form-check mb-3">
                      <input class="form-check-input" type="checkbox" id="enable2fa" onchange="toggle2FA()">
                      <label class="form-check-label">Enable 2FA</label>
                    </div>
										<div class="text-center mt-3">
											<a href="#" class="btn btn-lg btn-primary">Sign up</a>
											<!-- <button type="submit" class="btn btn-lg btn-primary">Sign up</button> -->
										</div>
                    
									</form>
								</div>
							</div>
						</div>

					</div>
				</div>
			</div>
		</div>

</body>
</html>
