<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dental Appointment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css">
  
</head>
<body>
 
  <nav class="navbar navbar-expand-lg px-4">
    <a class="navbar-brand fw-semibold text-dark" href="index.html">Dental Clinic Appointment</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="index.html">Book Appointment</a></li>
      <li class="nav-item"><a class="nav-link" href="Schedule.html">Schedule</a></li>
      <li class="nav-item"><a class="nav-link" href="Login.html">Login</a></li>
      <li class="nav-item"><a class="nav-link" href="Register.html">Register</a></li>
    </ul>
  </nav>

   <div class="container py-5 text-center">
    <p class="text-muted mb-5" style="font-size:14px">Book Appointments and Edit/Cancel existing appointments</p>
    <div class="d-flex justify-content-center gap-3">
      <a href="Edit.html" class="btn btn-outline-secondary px-4">Edit / Cancel Booking</a>
    </div>
  </div>
 
   <!-- BOOKING + SIDEBAR -->
  <div class="booking-section">
    <div class="row g-5 justify-content-center">
 
      <!-- BOOKING FORM -->
      <div class="col-lg-6 col-md-8">
        <h2>Book an appointment</h2>
        <p class="sub">Fill in your details and we'll confirm your slot.</p>
        <div class="booking-card">
 
          <p class="section-label">Your details</p>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label">First name</label>
              <input type="text" class="form-control" placeholder="Jane"/>
            </div>
            <div class="col-6">
              <label class="form-label">Last name</label>
              <input type="text" class="form-control" placeholder="Smith"/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" placeholder="jane@email.com"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone number</label>
            <input type="tel" class="form-control" placeholder="+1 (555) 000-0000"/>
          </div>
 
          <p class="section-label">Appointment details</p>
          <div class="mb-3">
            <label class="form-label">Select doctor</label>
            <select class="form-select">
              <option value="">— Choose a doctor —</option>
              <option>Dr. Sarah Ahmed</option>
              <option>Dr. James Liu</option>
              <option>Dr. Maria Costa</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Service</label>
            <select class="form-select">
              <option value="">— Choose a service —</option>
              <option>General Checkup</option>
              <option>Teeth Whitening</option>
              <option>Filling</option>
              <option>Orthodontics</option>
              <option>Root Canal</option>
              <option>Pediatric</option>
            </select>
          </div>
          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="form-label">Preferred date</label>
              <input type="date" class="form-control"/>
            </div>
            <div class="col-6">
              <label class="form-label">Preferred time</label>
              <select class="form-select">
                <option>9:00 AM</option>
                <option>10:00 AM</option>
                <option>11:00 AM</option>
                <option>1:00 PM</option>
                <option>2:00 PM</option>
                <option>3:00 PM</option>
                <option>4:00 PM</option>
                <option>5:00 PM</option>
              </select>
            </div>
          </div>
 
          <button class="btn btn-green w-100 py-2 rounded-3" style="font-size:15px">Confirm booking</button>
        </div>
      </div>

</body>
</html>
