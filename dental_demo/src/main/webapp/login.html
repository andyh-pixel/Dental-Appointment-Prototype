<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <nav class="navbar navbar-expand-lg px-4">
    <a class="navbar-brand fw-semibold text-dark" href="index.html">Dental Clinic Appointment</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="index.html">Schedule</a></li>
      <li class="nav-item"><a class="nav-link" href="book.html">Book Appointment</a></li>
      <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
      <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
    </ul>
  </nav>

  <body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
      <div class="card p-4 shadow-sm" style="width: 350px;">

        <h4 class="mb-3 text-center">Login</h4>
        <form id="loginForm" action="login" method="POST">
          <!-- Username -->
          <div class="mb-3">
            <label class="form-label">Username</label>
            <!-- <input type="text" id="username" class="form-control"> -->
            <input type="text" id="username" name="username" placeholder="Username" class="form-control" required>
          </div>

          <!-- Password -->
          <div class="mb-3">
            <label class="form-label">Password</label>
            <!-- <input type="password" id="password" class="form-control"> -->
            <input type="password" id="password" name="password" placeholder="Password" class="form-control" required>
          </div>

          <!-- Enable 2FA -->
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="enable2fa" onchange="toggle2FA()">
            <label class="form-check-label">Enable 2FA</label>
          </div>

          <!-- 2FA Code (hidden by default) -->
          <div class="mb-3" id="twofaSection" style="display:none;">
            <label class="form-label">2FA Code</label>
            <input type="text" id="twofa" class="form-control" placeholder="Enter code">
          </div>

          <!-- Login Button -->
          <button class="btn btn-primary w-100" type="submit">Login</button>
        </form>
        <p id="error" style="color:red;"></p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Demo login info
Username: admin
Password: 1234
2FA Code: 123456 -->

    <script>
      function toggle2FA() {
        const checkbox = document.getElementById("enable2fa");
        const section = document.getElementById("twofaSection");

        section.style.display = checkbox.checked ? "block" : "none";
      }

      function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const enable2fa = document.getElementById("enable2fa").checked;
        const code = document.getElementById("twofa").value;

        // Simple demo credentials
        if (username !== "admin" || password !== "1234") {
          alert("Invalid username or password");
          return;
        }

        // If 2FA is enabled, check code
        if (enable2fa) {
          if (code !== "123456") {
            alert("Invalid 2FA code");
            return;
          }
        }

        alert("Login successful!");
        // window.location.href = "index.html"; // optional redirect
      }

      function showErrorFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");

        if (error) {
          document.getElementById("error").innerText = error;

          // optional: clean the URL after showing the error
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      }

      function validateLoginForm(e) {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorElement = document.getElementById("error");

        // clear old error first
        errorElement.innerText = "";

        if (!username || !password) {
          e.preventDefault();
          errorElement.innerText = "Please fill all fields";
        }
      }

      function setupLoginValidation() {
        const form = document.getElementById("loginForm");
        form.addEventListener("submit", validateLoginForm);
      }

      document.addEventListener("DOMContentLoaded", function () {
        showErrorFromUrl();
        setupLoginValidation();
      });
    </script>

  </body>

</html>
